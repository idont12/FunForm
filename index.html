<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Blueprint Form</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
  
  <style>
    /* Reset everything so it fills the iframe properly */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #006AEB; 
      font-family: 'Architects Daughter', cursive, sans-serif;
      color: white;
      overflow-x: hidden; /* Prevent horizontal scrollbars */
    }

    /* Container is now the full screen */
    .blueprint-container {
    border: 4px solid white;
    border-radius: 10px;
    padding: 30px;
    width: 100%;
    min-height: 100%;
    min-width: 300px;
    box-sizing: border-box;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    }

    /* Wrapper to keep inner content somewhat contained but responsive */
    .content-wrapper {
        width: 100%;
        max-width: 800px;
    }

    h2 {
      font-size: 2rem;
      margin: 0 0 30px 0;
      font-weight: normal;
      letter-spacing: 1px;
    }

    .blueprint-btn {
      background: transparent;
      border: 3px solid white;
      border-radius: 8px;
      color: white;
      padding: 8px 20px;
      font-size: 1.2rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 20px;
      display: inline-block; 
    }

    .blueprint-btn:hover {
      background-color: white;
      color: #006AEB;
    }

    .text-input, .select-input {
      width: 100%;
      background: transparent;
      border: 3px solid white;
      border-radius: 8px;
      color: white;
      padding: 12px;
      font-size: 1.2rem;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
    }

    .text-input::placeholder {
  color: #ffffff99 !important;
}

    .select-input {
      cursor: pointer;
    }
    
    .select-input option {
      color: #006AEB;
      background-color: white;
    }

    .rating-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center; 
      width: 100%;
    }

    .stars-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 5px; 
    }

    .star {
      width: 60px;
      height: 60px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .star:hover {
      transform: scale(1.1);
    }

    .star-labels {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .star-label {
      width: 60px;
      text-align: center;
      font-size: 1rem;
    }

    .blueprint-wrapper-inner {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 30px;
        width: 100%;
    }

    .tape-fixed-image {
        position: relative;
        flex-shrink: 0;
        transform: rotate(-3deg);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid white;
        padding: 10px;
    }

    .tape-fixed-image img {
        max-width: 250px;
        height: auto;
    }

    .tape-fixed-image::before, .tape-fixed-image::after {
        content: '';
        position: absolute;
        width: 100px;
        height: 25px;
        background-color: rgba(255, 255, 255, 0.4); 
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .tape-fixed-image::before {
        top: -15px;
        left: -40px;
        transform: rotate(45deg);
    }

    .tape-fixed-image::after {
        bottom: -15px;
        right: -40px;
        transform: rotate(45deg);
    }
    
    .pagination-dots {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
      width: 100%;
    }

    .pagination-dot {
      width: 15px;
      height: 15px;
      border: 2px solid white;
      border-radius: 50%;
      box-sizing: border-box;
    }

    .pagination-dot.filled {
      background-color: white; 
    }

    .endTitle{
      margin-bottom: 0;
    }

    .email-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 43, 82, 0.72);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      box-sizing: border-box;
      animation: fadeIn 0.18s ease-out;
    }

    .email-modal-card {
      width: min(100%, 520px);
      border: 3px solid white;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.08));
      box-shadow: inset 0 0 18px rgba(0, 0, 0, 0.18), 0 18px 50px rgba(0, 0, 0, 0.25);
      padding: 24px;
      position: relative;
    }

    .email-modal-title {
      font-size: 1.7rem;
      margin: 0 0 10px 0;
      text-align: center;
    }

    .email-modal-copy {
      text-align: center;
      margin: 0 0 22px 0;
      line-height: 1.5;
      font-size: 1.05rem;
    }

    .email-modal-actions {
      display: grid;
      gap: 12px;
    }

    .email-choice-btn {
      width: 100%;
      margin-top: 0;
      padding: 12px 16px;
      font-size: 1.1rem;
      text-align: center;
    }

    .email-modal-footer {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .email-modal-close {
      background: transparent;
      border: 0;
      color: white;
      font: inherit;
      cursor: pointer;
      text-decoration: underline;
      opacity: 0.9;
    }

    .email-choice-btn:focus-visible,
    .email-modal-close:focus-visible,
    .blueprint-btn:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 3px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Particle Animation CSS --- */
    .particle {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      animation: shoot 1s ease-out forwards;
    }

    @keyframes shoot {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0);
        opacity: 0;
      }
    }

    /* --- RESPONSIVE ADJUSTMENTS --- */
    @media (max-width: 600px) {
        /* Stack image on top of text for small widths */
        .blueprint-wrapper-inner {
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .tape-fixed-image {
            transform: rotate(-1deg);
        }

        .tape-fixed-image img {
            max-width: 180px; 
        }

        .star-labels{
          margin-bottom: 0;
        }

        h2 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 15px;
        }
        .blueprint-btn { padding: 6px 14px; font-size: 1rem; }

        /* Shrink stars slightly for tiny screens */
        .star {
            width: 45px;
            height: 45px;
        }
        .star-label {
            width: 45px;
        }
        .stars-container, .star-labels {
            gap: 5px;
        }
    }

    /* Extra small adjustment for extreme min-sizes (like 300x150) */
    @media (max-height: 400px), (max-width: 350px) {
        .blueprint-container {
            padding: 15px;
            border-width: 2px;
        }
        .tape-fixed-image img {
            max-width: 100px;
        }
        .tape-fixed-image::before, .tape-fixed-image::after {
            width: 50px;
            height: 15px;
        }
        h2 { font-size: 1.2rem; }
        .star { width: 35px; height: 35px; }
        .star-label { width: 35px; font-size: 0.8rem; }
        .blueprint-btn { padding: 6px 14px; font-size: 1rem; }
        .pagination-dots,.blueprint-btn {margin-top: 10px;}
    }

  </style>
</head>
<body>

  <div class="blueprint-container" id="form-container">

  <script>
    const starEmpty = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
    const starFilled = `<svg viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
    
    let formId = '';
    let proxyUrl = '';
    let questions = [];
    let currentStep = 0;
    let answers = {};
    let hoveredRating = 0; 

    function init() {
      const params = new URLSearchParams(window.location.search);
      formId = params.get('formId');
      proxyUrl = params.get('proxyUrl') || '';
      
      const qParams = params.getAll('q');
      if (qParams.length > 0) {
        questions = qParams.map(q => {
          const [entryId, type, title, ...optionsStr] = q.split('|');
          let imageUrl = '';
          let dropdownOptions = [];

          if(type === 'dropdown') {
              dropdownOptions = optionsStr[0] ? optionsStr[0].split(',') : [];
          } else if (type === 'rating' || type === 'text') {
              imageUrl = optionsStr[0] || '';
          }
          return { entryId, type, title, imageUrl, options: dropdownOptions };
        });
      } else {
        questions = [
          { entryId: 'demo1', type: 'rating', title: 'Rate the game', imageUrl: '' },
          { entryId: 'demo2', type: 'dropdown', title: 'Pick a genre', imageUrl: '', options: ['Platformer', 'RPG', 'Puzzle'] }
        ];
      }
      render();
    }

    function handleRating(entryId, value) {
        answers[entryId] = value;
        handleStarLeave(entryId); 
    }

    function handleStarHover(entryId, value) {
        hoveredRating = value;
        renderStarIcons(entryId);
    }

    function handleStarLeave(entryId) {
        hoveredRating = 0;
        renderStarIcons(entryId);
    }

    function nextStep() {
      if (currentStep < questions.length - 1) {
        currentStep++;
        render();
      } else {
        submitForm();
      }
    }

    function buildFallbackEmailBody(extraMessage) {
      let emailBodyText = extraMessage + "\n\n";
      questions.forEach(q => {
          const ans = answers[q.entryId] || "No answer provided";
          emailBodyText += `- ${q.title}\n  Answer: ${ans}\n\n`;
      });
      emailBodyText += "Have a great day!";
      return emailBodyText;
    }

    function getSubmissionIssues() {
      const issues = [];

      questions.forEach(q => {
        const answer = answers[q.entryId];

        if (q.type === 'rating') {
          const rating = Number(answer);
          if (!Number.isInteger(rating) || rating < 1 || rating > 5) {
            issues.push(`${q.title} needs a rating from 1 to 5.`);
          }
        } else if (q.type === 'dropdown') {
          if (!q.options.includes(answer)) {
            issues.push(`${q.title} must be one of the dropdown options.`);
          }
        } else if (q.type === 'text') {
          if (typeof answer !== 'string' || answer.trim() === '') {
            issues.push(`${q.title} needs a text answer.`);
          }
        }
      });

      return issues;
    }

function showErrorScreen(message, extraMessage) {
  const emailBodyText = buildFallbackEmailBody(extraMessage);

  const mailtoLink =
    `mailto:hrsi9080@gmail.com?subject=${encodeURIComponent("Form Fallback Submission")}&body=${encodeURIComponent(emailBodyText)}`;

  const gmailLink =
    `https://mail.google.com/mail/?view=cm&fs=1&to=hrsi9080@gmail.com&su=${encodeURIComponent("Form Fallback Submission")}&body=${encodeURIComponent(emailBodyText)}`;

  document.getElementById('form-container').innerHTML = `
      <div class="content-wrapper" style="text-align: center;">
          <h2>Uh oh! 🛠️</h2>
          <p>${message}</p>

          <button class="blueprint-btn" onclick="openEmailOptions('${encodeURIComponent(gmailLink)}', '${encodeURIComponent(mailtoLink)}')">
              Open Email Options
          </button>
      </div>
  `;
}

function openEmailOptions(gmailEncoded, mailtoEncoded) {
  const gmailLink = decodeURIComponent(gmailEncoded);
  const mailtoLink = decodeURIComponent(mailtoEncoded);

  const existingModal = document.querySelector('.email-modal-overlay');
  if (existingModal) {
    existingModal.remove();
  }

  const modal = document.createElement('div');
  modal.className = 'email-modal-overlay';
  modal.innerHTML = `
      <div class="email-modal-card" role="dialog" aria-modal="true" aria-labelledby="emailModalTitle">
          <h3 class="email-modal-title" id="emailModalTitle">Choose email method</h3>
          <p class="email-modal-copy">Open Gmail in a small desktop window, or use your installed mail app.</p>

          <div class="email-modal-actions">
              <button class="blueprint-btn email-choice-btn" onclick="openGmailPopup('${gmailLink}')">
                  Open Gmail
              </button>

              <button class="blueprint-btn email-choice-btn" onclick="openMailApp('${mailtoLink}')">
                  Open Mail App
              </button>
          </div>

          <div class="email-modal-footer">
              <button class="email-modal-close" onclick="closeEmailOptions()">
                  Cancel
              </button>
          </div>
      </div>
  `;

  document.body.appendChild(modal);
}

function closeEmailOptions() {
  const modal = document.querySelector('.email-modal-overlay');
  if (modal) {
    modal.remove();
  }
}

function openGmailPopup(gmailLink) {
  const isDesktop = window.matchMedia('(min-width: 768px)').matches;

  if (isDesktop) {
    const width = 560;
    const height = 720;
    const left = Math.max(0, Math.round((window.screen.width - width) / 2));
    const top = Math.max(0, Math.round((window.screen.height - height) / 2));
    const popup = window.open(
      gmailLink,
      'gmailWindow',
      `popup=yes,width=${width},height=${height},left=${left},top=${top},noopener,noreferrer`
    );

    if (popup) {
      popup.focus();
    } else {
      window.open(gmailLink, '_blank', 'noopener,noreferrer');
    }
  } else {
    window.open(gmailLink, '_blank', 'noopener,noreferrer');
  }

  closeEmailOptions();
}

function openMailApp(mailtoLink) {
  window.location.href = mailtoLink;
  closeEmailOptions();
}

    function showSuccessScreen() {
      document.getElementById('form-container').innerHTML = `
          <div class="content-wrapper" style="text-align: center;">
              <h2 class="endTitle">Thanks!</h2>
              <p>Your feedback was successfully sent.</p>
          </div>
      `;
    }

    async function postViaProxy() {
      const payload = {
        formId,
        answers
      };

      const response = await fetch(proxyUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        return { ok: false, status: response.status };
      }

      try {
        const data = await response.json();
        return {
          ok: data.ok !== false,
          status: data.status || response.status
        };
      } catch (error) {
        return { ok: true, status: response.status };
      }
    }

    // --- NEW: Fire Particles Function ---
    function fireParticles() {
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        document.body.appendChild(particle);
        
        // Random spread between -250px and +250px
        const x = (Math.random() - 0.5) * 500; 
        const y = (Math.random() - 0.5) * 500;
        
        particle.style.setProperty('--x', `${x}px`);
        particle.style.setProperty('--y', `${y}px`);
        
        // Remove from DOM after animation completes
        setTimeout(() => particle.remove(), 1000);
      }
    }

    async function submitForm() {
      if (!formId) {
        showErrorScreen('Provide a valid formId in the URL to submit.', 'The formId is missing or invalid. Here are the answers collected so far:');
        return;
      }

      const issues = getSubmissionIssues();
      if (issues.length > 0) {
        showErrorScreen(
          'Some answers do not match what the form expects.',
          `Validation issues:\n${issues.map(issue => `- ${issue}`).join('\n')}\n\nHere are the answers collected so far:`
        );
        return;
      }

      // --- NEW: Show a Loading Screen Immediately ---
      document.getElementById('form-container').innerHTML = `
        <div class="content-wrapper" style="text-align: center;">
            <h2>Sending... ⏳</h2>
            <p>Transmitting your answers to the database.</p>
        </div>
      `;

      const formData = new FormData();
      for (const key in answers) {
        formData.append(key, answers[key]);
      }

      const url = `https://docs.google.com/forms/d/e/${formId}/formResponse`;

      // Set up a 5-second timeout for the network request
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);

      try {
        if (proxyUrl) {
          const result = await postViaProxy();
          clearTimeout(timeoutId);

          if (result.ok) {
            showSuccessScreen();
            fireParticles();
            return;
          }

          showErrorScreen(
            `Sorry, we had a problem sending your answers. (Proxy status ${result.status})`,
            'Hey there! I had some trouble submitting the form, but here are my answers:'
          );
          console.error('Proxy submission failed:', result);
          return;
        }

        // Without a proxy, we cannot read the real HTTP status from Google Forms.
        await fetch(url, {
            method: 'POST',
            mode: 'no-cors',
            body: formData,
            signal: controller.signal
        });

        clearTimeout(timeoutId);

        showSuccessScreen();
        fireParticles();
        console.info('Form submission completed without proxy. The request resolved successfully, but the browser cannot verify the Google Forms response status because of CORS restrictions.');
      } catch (error) {
        // This catches true network failures or the 5-second timeout.
        clearTimeout(timeoutId);
        showErrorScreen(
          'Sorry, we had a problem sending your answers.',
          'Hey there! I had some trouble submitting the form, but here are my answers:'
        );
        console.error('Form submission failed:', error);
      }
    }
    
    function render() {
      const container = document.getElementById('form-container');
      const q = questions[currentStep];
      const entryId = q.entryId;
      
      let html = `<div class="content-wrapper">`;
      html += `<div class="blueprint-wrapper-inner">`;

      if (q.imageUrl) {
          html += `
              <div class="tape-fixed-image">
                  <img src="${q.imageUrl}" alt="Context">
              </div>
          `;
      }
      
      html += `<div style="flex-grow: 1; width: 100%; text-align: center;">`;
      html += `<h2>${q.title}</h2>`;

      // RATING INPUT
      if (q.type === 'rating') {
        html += `<div class="rating-wrapper">`;
        html += `<div class="stars-container" onmouseleave="handleStarLeave('${entryId}')">`;
        
        for (let i = 1; i <= 5; i++) {
          html += `<div class="star" id="star-${i}"
                      onclick="handleRating('${entryId}', ${i})"
                      onmouseenter="handleStarHover('${entryId}', ${i})">
                   </div>`;
        }
        
        html += `</div>`;
        html += `<div class="star-labels">`;
        for (let i = 1; i <= 5; i++) {
          html += `<div class="star-label">${i}</div>`;
        }
        html += `</div>`;
        html += `</div>`; 
        
        html += `<button class="blueprint-btn" onclick="nextStep()">Next</button>`;
      } 
      
      // TEXT INPUT
      else if (q.type === 'text') {
        const currentVal = answers[entryId] || '';
        html += `
             <input type="text" class="text-input" placeholder="Type here..." 
                 value="${currentVal}"
               oninput="answers['${entryId}'] = this.value">
          <br>
          <button class="blueprint-btn" onclick="nextStep()">Next</button>
        `;
      } 
      
      // DROPDOWN INPUT
      else if (q.type === 'dropdown') {
        const selectedVal = answers[entryId] || '';
        html += `<select class="select-input" onchange="answers['${entryId}'] = this.value">
                  <option value="" disabled ${!selectedVal ? 'selected' : ''}>Choose...</option>`;
        q.options.forEach(opt => {
          html += `<option value="${opt}" ${selectedVal === opt ? 'selected' : ''}>${opt}</option>`;
        });
        html += `</select>
                 <br>
                 <button class="blueprint-btn" onclick="nextStep()">Next</button>`;
      }

      html += `</div>`; 
      html += `</div>`; 

      // PAGINATION DOTS
      html += `<div class="pagination-dots">`;
      questions.forEach((_, i) => {
        const filledClass = i === currentStep ? 'filled' : '';
        html += `<div class="pagination-dot ${filledClass}"></div>`;
      });
      html += `</div>`;
      html += `</div>`; // Close content-wrapper

      container.innerHTML = html;

      if (q.type === 'rating') {
        renderStarIcons(entryId);
      }
    }

    function renderStarIcons(entryId) {
        const savedRating = answers[entryId] || 0;
        const effectiveRating = hoveredRating || savedRating; 

        for (let i = 1; i <= 5; i++) {
            const starDiv = document.getElementById(`star-${i}`);
            if (starDiv) {
                if (i <= effectiveRating) {
                    starDiv.innerHTML = starFilled;
                } else {
                    starDiv.innerHTML = starEmpty;
                }
            }
        }
    }

    window.onload = init;
  </script>
</body>
</html>
