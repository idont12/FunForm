<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Blueprint Form</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
  
  <style>
    /* Reset everything so it fills the iframe properly */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #004d99; 
      font-family: 'Architects Daughter', cursive, sans-serif;
      color: white;
      overflow-x: hidden; /* Prevent horizontal scrollbars */
    }

    /* Container is now the full screen */
    .blueprint-container {
    border: 4px solid white;
    border-radius: 10px;
    padding: 30px;
    width: calc(100% - 40px);
    min-height: calc(100% - 40px);
    min-width: 300px;
    box-sizing: border-box;
    box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin: 20px;
    }

    /* Wrapper to keep inner content somewhat contained but responsive */
    .content-wrapper {
        width: 100%;
        max-width: 800px;
    }

    h2 {
      font-size: 2rem;
      margin: 0 0 30px 0;
      font-weight: normal;
      letter-spacing: 1px;
    }

    .blueprint-btn {
      background: transparent;
      border: 3px solid white;
      border-radius: 8px;
      color: white;
      padding: 12px 24px;
      font-size: 1.2rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 20px;
      display: inline-block; 
    }

    .blueprint-btn:hover {
      background-color: white;
      color: #004d99;
    }

    .text-input, .select-input {
      width: 100%;
      background: transparent;
      border: 3px solid white;
      border-radius: 8px;
      color: white;
      padding: 12px;
      font-size: 1.2rem;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
    }

    .select-input {
      cursor: pointer;
    }
    
    .select-input option {
      color: #004d99;
      background-color: white;
    }

    .rating-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center; 
      width: 100%;
    }

    .stars-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 5px; 
    }

    .star {
      width: 60px;
      height: 60px;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .star:hover {
      transform: scale(1.1);
    }

    .star-labels {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 10px;
    }

    .star-label {
      width: 60px;
      text-align: center;
      font-size: 1rem;
    }

    .blueprint-wrapper-inner {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 30px;
        width: 100%;
    }

    .tape-fixed-image {
        position: relative;
        flex-shrink: 0;
        transform: rotate(-3deg);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid white;
        padding: 10px;
    }

    .tape-fixed-image img {
        max-width: 250px;
        height: auto;
    }

    .tape-fixed-image::before, .tape-fixed-image::after {
        content: '';
        position: absolute;
        width: 100px;
        height: 25px;
        background-color: rgba(255, 255, 255, 0.4); 
        box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }

    .tape-fixed-image::before {
        top: -15px;
        left: -40px;
        transform: rotate(45deg);
    }

    .tape-fixed-image::after {
        bottom: -15px;
        right: -40px;
        transform: rotate(45deg);
    }
    
    .pagination-dots {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
      width: 100%;
    }

    .pagination-dot {
      width: 15px;
      height: 15px;
      border: 2px solid white;
      border-radius: 50%;
      box-sizing: border-box;
    }

    .pagination-dot.filled {
      background-color: #d3d3d3; 
    }

    /* --- Particle Animation CSS --- */
    .particle {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      z-index: 100;
      animation: shoot 1s ease-out forwards;
    }

    @keyframes shoot {
      0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(0);
        opacity: 0;
      }
    }

    /* --- RESPONSIVE ADJUSTMENTS --- */
    @media (max-width: 600px) {
        /* Stack image on top of text for small widths */
        .blueprint-wrapper-inner {
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        
        .tape-fixed-image {
            transform: rotate(-1deg);
        }

        .tape-fixed-image img {
            max-width: 180px; 
        }

        .star-labels{
          margin-bottom: 0;
        }

        h2 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 15px;
        }

        /* Shrink stars slightly for tiny screens */
        .star {
            width: 45px;
            height: 45px;
        }
        .star-label {
            width: 45px;
        }
        .stars-container, .star-labels {
            gap: 5px;
        }
    }

    /* Extra small adjustment for extreme min-sizes (like 300x150) */
    @media (max-height: 400px), (max-width: 350px) {
        .blueprint-container {
            padding: 15px;
            border-width: 2px;
        }
        .tape-fixed-image img {
            max-width: 100px;
        }
        .tape-fixed-image::before, .tape-fixed-image::after {
            width: 50px;
            height: 15px;
        }
        h2 { font-size: 1.2rem; }
        .star { width: 35px; height: 35px; }
        .star-label { width: 35px; font-size: 0.8rem; }
        .blueprint-btn { padding: 8px 16px; font-size: 1rem; }
        .pagination-dots,.blueprint-btn {margin-top: 10px;}
    }

  </style>
</head>
<body>

  <div class="blueprint-container" id="form-container">
  </div>

  <script>
    const starEmpty = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
    const starFilled = `<svg viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
    
    let formId = '';
    let questions = [];
    let currentStep = 0;
    let answers = {};
    let hoveredRating = 0; 

    function init() {
      const params = new URLSearchParams(window.location.search);
      formId = params.get('formId');
      
      const qParams = params.getAll('q');
      if (qParams.length > 0) {
        questions = qParams.map(q => {
          const [entryId, type, title, ...optionsStr] = q.split('|');
          let imageUrl = '';
          let dropdownOptions = [];

          if(type === 'dropdown') {
              dropdownOptions = optionsStr[0] ? optionsStr[0].split(',') : [];
          } else if (type === 'rating' || type === 'text') {
              imageUrl = optionsStr[0] || '';
          }
          return { entryId, type, title, imageUrl, options: dropdownOptions };
        });
      } else {
        questions = [
          { entryId: 'demo1', type: 'rating', title: 'Rate the game', imageUrl: '' },
          { entryId: 'demo2', type: 'dropdown', title: 'Pick a genre', imageUrl: '', options: ['Platformer', 'RPG', 'Puzzle'] }
        ];
      }
      render();
    }

    function handleRating(entryId, value) {
        answers[entryId] = value;
        handleStarLeave(entryId); 
    }

    function handleStarHover(entryId, value) {
        hoveredRating = value;
        renderStarIcons(entryId);
    }

    function handleStarLeave(entryId) {
        hoveredRating = 0;
        renderStarIcons(entryId);
    }

    function nextStep() {
      if (currentStep < questions.length - 1) {
        currentStep++;
        render();
      } else {
        submitForm();
      }
    }

    // --- NEW: Fire Particles Function ---
    function fireParticles() {
      for (let i = 0; i < 40; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        document.body.appendChild(particle);
        
        // Random spread between -250px and +250px
        const x = (Math.random() - 0.5) * 500; 
        const y = (Math.random() - 0.5) * 500;
        
        particle.style.setProperty('--x', `${x}px`);
        particle.style.setProperty('--y', `${y}px`);
        
        // Remove from DOM after animation completes
        setTimeout(() => particle.remove(), 1000);
      }
    }

    async function submitForm() {
      if (!formId) {
        document.getElementById('form-container').innerHTML = `<div class="content-wrapper" style="text-align:center;"><h2>Complete!</h2><p>Provide a valid formId in the URL to submit.</p></div>`;
        return;
      }

      const formData = new FormData();
      for (const key in answers) {
        formData.append(key, answers[key]);
      }

      const url = `https://docs.google.com/forms/d/e/${formId}/formResponse`;

      try {
        await fetch(url, { method: 'POST', mode: 'no-cors', body: formData });
        
        document.getElementById('form-container').innerHTML = `
            <div class="content-wrapper" style="text-align: center;">
                <h2>Thanks! ✨</h2>
                <p>Your feedback was successfully sent.</p>
            </div>
        `;
        
        // Trigger the visual effect!
        fireParticles();

      } catch (error) {
        let emailBodyText = "Hey there! I had some trouble submitting the form, but here are my answers:\n\n";
        questions.forEach(q => {
            const ans = answers[q.entryId] || "No answer provided";
            emailBodyText += `• ${q.title}\n  Answer: ${ans}\n\n`;
        });
        emailBodyText += "Have a great day! 🎮✨";
        
        const mailtoLink = `mailto:hrsi9080@gmail.com?subject=Form Fallback Submission&body=${encodeURIComponent(emailBodyText)}`;

        document.getElementById('form-container').innerHTML = `
            <div class="content-wrapper" style="text-align: center;">
                <h2>Uh oh! 🛠️</h2>
                <p>Sorry, we had a problem sending your answers to the database.</p>
                <p>But don't worry! You can send us an email with your answers directly.</p>
                <a href="${mailtoLink}" style="text-decoration: none;">
                    <button class="blueprint-btn">Send via Email ✉️</button>
                </a>
            </div>
        `;
      }
    }

    function render() {
      const container = document.getElementById('form-container');
      const q = questions[currentStep];
      const entryId = q.entryId;
      
      let html = `<div class="content-wrapper">`;
      html += `<div class="blueprint-wrapper-inner">`;

      if (q.imageUrl) {
          html += `
              <div class="tape-fixed-image">
                  <img src="${q.imageUrl}" alt="Context">
              </div>
          `;
      }
      
      html += `<div style="flex-grow: 1; width: 100%; text-align: center;">`;
      html += `<h2>${q.title}</h2>`;

      // RATING INPUT
      if (q.type === 'rating') {
        html += `<div class="rating-wrapper">`;
        html += `<div class="stars-container" onmouseleave="handleStarLeave('${entryId}')">`;
        
        for (let i = 1; i <= 5; i++) {
          html += `<div class="star" id="star-${i}"
                      onclick="handleRating('${entryId}', ${i})"
                      onmouseenter="handleStarHover('${entryId}', ${i})">
                   </div>`;
        }
        
        html += `</div>`;
        html += `<div class="star-labels">`;
        for (let i = 1; i <= 5; i++) {
          html += `<div class="star-label">${i}</div>`;
        }
        html += `</div>`;
        html += `</div>`; 
        
        html += `<button class="blueprint-btn" onclick="nextStep()">Next</button>`;
      } 
      
      // TEXT INPUT
      else if (q.type === 'text') {
        const currentVal = answers[entryId] || '';
        html += `
          <input type="text" class="text-input" placeholder="Type here..." 
                 value="${currentVal}"
                 onchange="answers['${entryId}'] = this.value">
          <br>
          <button class="blueprint-btn" onclick="nextStep()">Next</button>
        `;
      } 
      
      // DROPDOWN INPUT
      else if (q.type === 'dropdown') {
        const selectedVal = answers[entryId] || '';
        html += `<select class="select-input" onchange="answers['${entryId}'] = this.value">
                  <option value="" disabled ${!selectedVal ? 'selected' : ''}>Choose...</option>`;
        q.options.forEach(opt => {
          html += `<option value="${opt}" ${selectedVal === opt ? 'selected' : ''}>${opt}</option>`;
        });
        html += `</select>
                 <br>
                 <button class="blueprint-btn" onclick="nextStep()">Next</button>`;
      }

      html += `</div>`; 
      html += `</div>`; 

      // PAGINATION DOTS
      html += `<div class="pagination-dots">`;
      questions.forEach((_, i) => {
        const filledClass = i === currentStep ? 'filled' : '';
        html += `<div class="pagination-dot ${filledClass}"></div>`;
      });
      html += `</div>`;
      html += `</div>`; // Close content-wrapper

      container.innerHTML = html;

      if (q.type === 'rating') {
        renderStarIcons(entryId);
      }
    }

    function renderStarIcons(entryId) {
        const savedRating = answers[entryId] || 0;
        const effectiveRating = hoveredRating || savedRating; 

        for (let i = 1; i <= 5; i++) {
            const starDiv = document.getElementById(`star-${i}`);
            if (starDiv) {
                if (i <= effectiveRating) {
                    starDiv.innerHTML = starFilled;
                } else {
                    starDiv.innerHTML = starEmpty;
                }
            }
        }
    }

    window.onload = init;
  </script>
</body>
</html>
